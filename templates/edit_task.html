{% extends "base.html" %}

{% block title %}
Edit Task | TaskFlow
{% endblock %}

{% block content %}

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow">

<div class="card-header">

<h3>

<i class="bi bi-pencil-square"></i>

Edit Task

</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Task Title

</label>

<input

type="text"

name="title"

class="form-control"

value="{{ task.title }}"

required>

</div>

<div class="mb-3">

<label class="form-label">

Description

</label>

<textarea

name="description"

rows="4"

class="form-control">{{ task.description }}</textarea>

</div>

<div class="row">

<div class="col-md-4 mb-3">

<label class="form-label">

Priority

</label>

<select

name="priority"

class="form-select">

<option value="Low"

{% if task.priority=="Low" %}selected{% endif %}>

Low

</option>

<option value="Medium"

{% if task.priority=="Medium" %}selected{% endif %}>

Medium

</option>

<option value="High"

{% if task.priority=="High" %}selected{% endif %}>

High

</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

Status

</label>

<select

name="status"

class="form-select">

<option value="Pending"

{% if task.status=="Pending" %}selected{% endif %}>

Pending

</option>

<option value="Completed"

{% if task.status=="Completed" %}selected{% endif %}>

Completed

</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

Due Date

</label>

<input

type="date"

name="due_date"

class="form-control"

value="{{ task.due_date }}">

</div>

</div>

<hr>

<div class="d-flex justify-content-between">

<a

href="/dashboard"

class="btn btn-secondary">

<i class="bi bi-arrow-left"></i>

Back

</a>

<div>

<button

type="reset"

class="btn btn-warning">

<i class="bi bi-arrow-clockwise"></i>

Reset

</button>

<button

type="submit"

class="btn btn-success">

<i class="bi bi-check-circle-fill"></i>

Update Task

</button>

</div>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
