{% extends "base.html" %}

{% block content %}

<div class="card shadow">

<div class="card-body">

<h2 class="mb-4">

Edit Task

</h2>

<form method="POST">

<div class="mb-3">

<label>

Title

</label>

<input

class="form-control"

name="title"

value="{{ task['title'] }}"

required>

</div>

<div class="mb-3">

<label>

Description

</label>

<textarea

class="form-control"

name="description"

rows="4">{{ task['description'] }}</textarea>

</div>

<div class="row">

<div class="col">

<label>

Priority

</label>

<select

class="form-select"

name="priority">

<option {% if task["priority"]=="High" %}selected{% endif %}>High</option>

<option {% if task["priority"]=="Medium" %}selected{% endif %}>Medium</option>

<option {% if task["priority"]=="Low" %}selected{% endif %}>Low</option>

</select>

</div>

<div class="col">

<label>

Category

</label>

<input

class="form-control"

name="category"

value="{{ task['category'] }}">

</div>

</div>

<div class="mt-3">

<label>

Due Date

</label>

<input

type="date"

class="form-control"

name="due_date"

value="{{ task['due_date'] }}">

</div>

<div class="mt-4">

<button

class="btn btn-primary">

Save Changes

</button>

<a

href="/"

class="btn btn-secondary">

Cancel

</a>

</div>

</form>

</div>

</div>

{% endblock %}
